<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Finance Knowledge Graph</title>
  <desc id="desc">A professional dark banner combining market charts, neural network nodes, and knowledge graph links.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B12"/>
      <stop offset="0.45" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 116) rotate(129) scale(374 240)">
      <stop stop-color="#D6B36A" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#D6B36A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(370 280) rotate(28) scale(420 250)">
      <stop stop-color="#17B8A6" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#17B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGradient" x1="163" y1="292" x2="1054" y2="98" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17B8A6"/>
      <stop offset="0.45" stop-color="#C9A45C"/>
      <stop offset="1" stop-color="#6E56CF"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.72 0 0 0 0 0.65 0 0 0 0.75 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#D6E4F0" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="34" fill="url(#grid)"/>
  <rect width="1280" height="420" rx="34" fill="url(#goldGlow)"/>
  <rect width="1280" height="420" rx="34" fill="url(#tealGlow)"/>

  <g opacity="0.2">
    <path d="M0 326 C160 294 226 338 370 300 C518 260 596 184 764 196 C944 208 1026 138 1280 94" stroke="#D6E4F0" stroke-width="1.4"/>
    <path d="M0 356 C178 328 260 364 420 316 C548 278 636 238 804 246 C948 254 1078 174 1280 142" stroke="#17B8A6" stroke-width="1.2"/>
  </g>

  <g transform="translate(78 70)">
    <rect x="0" y="0" width="590" height="280" rx="28" fill="#0B1220" fill-opacity="0.7" stroke="#D6E4F0" stroke-opacity="0.12"/>
    <text x="34" y="58" fill="#C9A45C" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="4">AI FINANCE LAB</text>
    <text x="34" y="112" fill="#F8FAFC" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700">Knowledge Graph</text>
    <text x="34" y="164" fill="#F8FAFC" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700">for Capital Insight</text>
    <text x="36" y="210" fill="#A9B8C8" font-family="Verdana, Geneva, sans-serif" font-size="18">Research automation · Risk logic · Graph publishing</text>
    <g transform="translate(34 236)">
      <rect x="0" y="0" width="124" height="34" rx="17" fill="#17B8A6" fill-opacity="0.14" stroke="#17B8A6" stroke-opacity="0.5"/>
      <text x="20" y="23" fill="#6EF3E1" font-family="Verdana, Geneva, sans-serif" font-size="13" font-weight="700">AI AGENTS</text>
      <rect x="140" y="0" width="148" height="34" rx="17" fill="#C9A45C" fill-opacity="0.14" stroke="#C9A45C" stroke-opacity="0.55"/>
      <text x="160" y="23" fill="#F4D58D" font-family="Verdana, Geneva, sans-serif" font-size="13" font-weight="700">FINANCE KG</text>
      <rect x="304" y="0" width="162" height="34" rx="17" fill="#6E56CF" fill-opacity="0.16" stroke="#8C7CFF" stroke-opacity="0.55"/>
      <text x="324" y="23" fill="#C8C0FF" font-family="Verdana, Geneva, sans-serif" font-size="13" font-weight="700">PUBLISHING</text>
    </g>
  </g>

  <g transform="translate(724 72)">
    <rect x="0" y="0" width="472" height="278" rx="26" fill="#0F172A" fill-opacity="0.55" stroke="#D6E4F0" stroke-opacity="0.13"/>
    <g opacity="0.95">
      <path d="M50 206 L104 178 L150 188 L198 132 L246 148 L310 88 L366 104 L424 62" stroke="url(#lineGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
      <path d="M50 236 H424" stroke="#D6E4F0" stroke-opacity="0.12"/>
      <path d="M50 56 V236" stroke="#D6E4F0" stroke-opacity="0.12"/>
      <g fill="#C9A45C">
        <circle cx="104" cy="178" r="6"/>
        <circle cx="198" cy="132" r="6"/>
        <circle cx="310" cy="88" r="6"/>
        <circle cx="424" cy="62" r="6"/>
      </g>
      <g fill="#17B8A6">
        <circle cx="50" cy="206" r="5"/>
        <circle cx="150" cy="188" r="5"/>
        <circle cx="246" cy="148" r="5"/>
        <circle cx="366" cy="104" r="5"/>
      </g>
    </g>

    <g transform="translate(72 52)" opacity="0.34">
      <line x1="256" y1="58" x2="318" y2="30" stroke="#D6E4F0"/>
      <line x1="256" y1="58" x2="328" y2="96" stroke="#D6E4F0"/>
      <line x1="328" y1="96" x2="390" y2="70" stroke="#D6E4F0"/>
      <line x1="318" y1="30" x2="390" y2="70" stroke="#D6E4F0"/>
      <line x1="300" y1="142" x2="328" y2="96" stroke="#D6E4F0"/>
      <circle cx="256" cy="58" r="11" fill="#17B8A6"/>
      <circle cx="318" cy="30" r="8" fill="#C9A45C"/>
      <circle cx="328" cy="96" r="9" fill="#6E56CF"/>
      <circle cx="390" cy="70" r="10" fill="#17B8A6"/>
      <circle cx="300" cy="142" r="7" fill="#C9A45C"/>
    </g>

    <g font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#A9B8C8">
      <text x="52" y="34">MARKET SIGNAL</text>
      <text x="306" y="248">GRAPH INTELLIGENCE</text>
    </g>
  </g>

  <g opacity="0.22" fill="#D6E4F0" font-family="Courier New, monospace" font-size="12">
    <text x="936" y="382">risk_score: 0.82</text>
    <text x="86" y="386">entity.relation.pipeline()</text>
    <text x="1036" y="40">alpha · graph · agent</text>
  </g>
</svg>
